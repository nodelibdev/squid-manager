<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Squid Manager</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            color: #222;
            padding: 24px
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 20px
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 0
        }

        .tab {
            padding: 9px 22px;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: .95rem;
            background: #e2e8f0;
            color: #555;
            font-weight: 500
        }

        .tab.active {
            background: #fff;
            color: #2563eb;
            box-shadow: 0 -1px 4px rgba(0, 0, 0, .08)
        }

        .panel {
            display: none;
            background: #fff;
            border-radius: 0 8px 8px 8px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .1)
        }

        .panel.active {
            display: block
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px
        }

        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px
        }

        input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: .9rem
        }

        input:focus {
            outline: none;
            border-color: #2563eb
        }

        button {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: .9rem
        }

        .btn-add {
            background: #2563eb;
            color: #fff
        }

        .btn-add:hover {
            background: #1d4ed8
        }

        /* Table */
        .table-wrap {
            max-height: 360px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 6px
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .88rem
        }

        thead th {
            position: sticky;
            top: 0;
            background: #f8fafc;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #e5e7eb;
            color: #555
        }

        tbody td {
            padding: 7px 12px;
            border-bottom: 1px solid #f0f0f0
        }

        tbody tr:last-child td {
            border-bottom: none
        }

        tbody tr:hover {
            background: #f8fafc
        }

        .btn-del {
            background: none;
            color: #dc2626;
            font-size: .85rem;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid transparent
        }

        .btn-del:hover {
            background: #fee2e2;
            border-color: #fca5a5
        }

        .count {
            font-size: .8rem;
            color: #888;
            margin-bottom: 8px
        }

        .empty-row td {
            color: #999;
            text-align: center;
            padding: 20px
        }

        /* Bottom bar */
        .bottom-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 20px
        }

        .btn-reload {
            background: #16a34a;
            color: #fff;
            padding: 9px 20px;
            font-size: .95rem
        }

        .btn-reload:hover {
            background: #15803d
        }

        .btn-reload:disabled {
            background: #aaa;
            cursor: not-allowed
        }

        .status {
            font-size: .85rem;
            padding: 7px 12px;
            border-radius: 6px;
            display: none
        }

        .status.ok {
            background: #dcfce7;
            color: #166534;
            display: block
        }

        .status.err {
            background: #fee2e2;
            color: #991b1b;
            display: block
        }
    </style>
</head>

<body>
    <h1>🦑 Squid Manager</h1>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('domain')">🌐 Domains</button>
        <button class="tab" onclick="switchTab('ip')">🖧 IP Addresses</button>
    </div>

    <div class="panel active" id="panel-domain">
        <div class="input-row">
            <input id="inp-domain" placeholder="example.com" onkeydown="if(event.key==='Enter')addEntry('domain')" />
            <button class="btn-add" onclick="addEntry('domain')">+ Add</button>
        </div>
        <div class="filter-row">
            <input id="filter-domain" placeholder="🔍 Filter…" oninput="renderTable('domain')" />
        </div>
        <div class="count" id="count-domain"></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Domain</th>
                        <th style="width:80px">Action</th>
                    </tr>
                </thead>
                <tbody id="tbody-domain"></tbody>
            </table>
        </div>
    </div>

    <div class="panel" id="panel-ip">
        <div class="input-row">
            <input id="inp-ip" placeholder="192.168.1.100 or 10.0.0.0/24"
                onkeydown="if(event.key==='Enter')addEntry('ip')" />
            <button class="btn-add" onclick="addEntry('ip')">+ Add</button>
        </div>
        <div class="filter-row">
            <input id="filter-ip" placeholder="🔍 Filter…" oninput="renderTable('ip')" />
        </div>
        <div class="count" id="count-ip"></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>IP / CIDR</th>
                        <th style="width:80px">Action</th>
                    </tr>
                </thead>
                <tbody id="tbody-ip"></tbody>
            </table>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-reload" id="btn-reload" onclick="reloadSquid()">⟳ Reload Squid</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        const data = { domain: [], ip: [] };
        let _headers = null;

        function getHeaders() {
            if (!_headers) {
                const token = prompt("Access Token:");
                _headers = {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                };
            }
            return _headers;
        }

        function switchTab(type) {
            document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", ["domain", "ip"][i] === type));
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
            document.getElementById("panel-" + type).classList.add("active");
        }

        function renderTable(type) {
            const q = document.getElementById("filter-" + type).value.trim().toLowerCase();
            const filtered = data[type].filter(e => !q || e.includes(q));
            const tbody = document.getElementById("tbody-" + type);
            const count = document.getElementById("count-" + type);
            count.textContent = q
                ? `Showing ${filtered.length} of ${data[type].length} entries`
                : `${data[type].length} entries`;
            tbody.innerHTML = filtered.length
                ? filtered.map(e => `<tr><td>${e}</td><td><button class="btn-del" onclick="delEntry('${type}','${e}')">Delete</button></td></tr>`).join("")
                : `<tr class="empty-row"><td colspan="2">No entries found</td></tr>`;
        }

        function showStatus(msg, ok) {
            const el = document.getElementById("status");
            el.textContent = msg;
            el.className = "status " + (ok ? "ok" : "err");
            setTimeout(() => el.style.display = "none", 3000);
        }

        async function loadList(type) {
            const r = await fetch("/api/" + type, { headers: getHeaders() });
            if (r.status === 401) { _headers = null; return; }
            const res = await r.json();
            data[type] = res.entries;
            renderTable(type);
        }

        async function addEntry(type) {
            const inp = document.getElementById("inp-" + type);
            const entry = inp.value.trim();
            if (!entry) return;
            const r = await fetch("/api/" + type, {
                method: "POST", headers: getHeaders(),
                body: JSON.stringify({ entry })
            });
            const res = await r.json();
            if (!r.ok) return showStatus(res.error, false);
            inp.value = "";
            data[type] = res.entries;
            renderTable(type);
        }

        async function delEntry(type, entry) {
            const r = await fetch("/api/" + type, {
                method: "DELETE", headers: getHeaders(),
                body: JSON.stringify({ entry })
            });
            const res = await r.json();
            data[type] = res.entries;
            renderTable(type);
        }

        async function reloadSquid() {
            const btn = document.getElementById("btn-reload");
            btn.disabled = true; btn.textContent = "Reloading…";
            const r = await fetch("/api/reload", { method: "POST", headers: getHeaders() });
            const res = await r.json();
            btn.disabled = false; btn.textContent = "⟳ Reload Squid";
            showStatus(r.ok ? "Squid reloaded successfully" : res.error, r.ok);
        }

        loadList("domain");
        loadList("ip");
    </script>
</body>

</html>
